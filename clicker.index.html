<!DOCTYPE html>
<html>
<head>
  <title>Super Cool Math Games 😎</title>
  <style>
    body { text-align:center; background:#111; color:#fff; font-family:sans-serif; }
    button { font-size:20px; padding:10px 20px; margin:10px; cursor:pointer; }
    #score { font-size:24px; margin-top:20px; }
  </style>
</head>
<body>
  <h1>Math Clicker Game 🎮</h1>
  <p>Solve the math to get points!</p>
  <p id="question"></p>
  <input type="number" id="answer" placeholder="Type your answer">
  <button onclick="checkAnswer()">Submit</button>
  <p id="score">Score: 0</p>

  <script>
    let score = 0;
    let a, b;

    function newQuestion() {
      a = Math.floor(Math.random()*10);
      b = Math.floor(Math.random()*10);
      document.getElementById("question").innerText = `What is ${a} + ${b}?`;
      document.getElementById("answer").value = '';
    }

    function checkAnswer() {
      let answer = parseInt(document.getElementById("answer").value);
      if(answer === a + b) {
        score++;
        alert("Correct! 🎉");
      } else {
        alert(`Wrong! 😢 The answer was ${a+b}`);
      }
      document.getElementById("score").innerText = "Score: " + score;
      newQuestion();
    }

    newQuestion();
  </script>
</body>
</html>
